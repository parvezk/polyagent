name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Type-check the whole CLI (tsc, no emit-only concerns — dist is gitignored).
      - run: npm run build

      # Unit + deterministic E2E smoke tests. No vendor keys required: the E2E
      # layer runs the CLI with fake adapters and an isolated temp state file.
      - run: npm test
